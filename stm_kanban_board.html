
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.board { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; padding: 1rem 0; align-items: start; }

.column-header {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0 0 10px 0;
  border-bottom: 2px solid var(--color-border-tertiary);
  margin-bottom: 10px;
}

.col-backlog .column-header { border-color: #B4B2A9; }
.col-todo .column-header { border-color: #85B7EB; }
.col-progress .column-header { border-color: #EF9F27; }
.col-stretch .column-header { border-color: #5DCAA5; }

.card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--color-border-secondary); }

.card-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 99px;
  margin-bottom: 6px;
}
.tag-refactor { background: #D3D1C7; color: #444441; }
.tag-workflow { background: #B5D4F4; color: #0C447C; }
.tag-analysis { background: #C0DD97; color: #27500A; }
.tag-validation { background: #FAC775; color: #633806; }

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-primary);
  line-height: 1.4;
  margin-bottom: 4px;
}

.card-meta {
  font-size: 11px;
  color: var(--color-text-tertiary);
}

.modal-backdrop {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  padding: 24px;
  max-width: 480px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}

.modal-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; margin-bottom: 10px; }
.modal-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; line-height: 1.4; }
.modal-section { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 6px; }
.modal-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; }
.modal-body ul { padding-left: 16px; }
.modal-body li { margin-bottom: 4px; }
.modal-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--color-text-secondary); line-height: 1;
  padding: 4px 8px;
}
.modal-close:hover { color: var(--color-text-primary); }

.difficulty-pip { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
.diff-1 { background: #1D9E75; }
.diff-2 { background: #EF9F27; }
.diff-3 { background: #E24B4A; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn {
  font-size: 12px; padding: 4px 12px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 99px;
  background: none;
  color: var(--color-text-secondary);
  cursor: pointer;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
}
</style>

<div style="padding: 1rem 0">

<div class="filter-bar" id="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('refactor', this)">Code quality</button>
  <button class="filter-btn" onclick="setFilter('workflow', this)">Workflow</button>
  <button class="filter-btn" onclick="setFilter('analysis', this)">Analysis</button>
  <button class="filter-btn" onclick="setFilter('validation', this)">Validation</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot diff-1"></div> Beginner</div>
  <div class="legend-item"><div class="legend-dot diff-2"></div> Intermediate</div>
  <div class="legend-item"><div class="legend-dot diff-3"></div> Advanced</div>
</div>

<div class="board" id="board"></div>

</div>

<div class="modal-backdrop" id="backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const tasks = [
  {
    col: 'todo',
    tag: 'refactor',
    title: 'Fix the image area calculation bug',
    difficulty: 1,
    effort: '1–2 hrs',
    skills: 'Python, reading documentation',
    context: 'In <code>img_file.load()</code>, the line computing <code>self.area</code> multiplies <code>nm_size²</code> by <code>px_sizex/px_sizex</code>, which always equals 1. This means the area stored is just <code>nm_size²</code> regardless of the image aspect ratio. For square images this is fine, but for rectangular images it will be wrong.',
    tasks: [
      'Read the <code>img_file</code> class and understand what <code>nm_size</code>, <code>px_sizex</code>, and <code>px_sizey</code> represent',
      'Decide what the correct formula should be. Is the image always square? What would the area be for a non-square image?',
      'Fix the formula and add a short comment explaining it',
      'Test with a non-square image to confirm it gives a sensible result'
    ],
    hint: 'Think about what <code>nm_size</code> represents physically — is it a width, height, or something else? Check the filename format described in the docstring.'
  },
  {
    col: 'todo',
    tag: 'refactor',
    title: 'Suppress the UserWarning in gray_process()',
    difficulty: 1,
    effort: '30–60 min',
    skills: 'Python, reading library docs',
    context: 'Running the notebook produces a warning: <em>"Possible precision loss converting image of type float64 to uint8"</em>. The <code>filters.rank.equalize()</code> function requires uint8 input, but the image is float64. The fix is to explicitly convert it first using <code>skimage.util.img_as_ubyte()</code>.',
    tasks: [
      'Read the skimage docs for <code>img_as_ubyte()</code> — what does it do and when should it be used?',
      'Add the conversion step before the <code>rank.equalize()</code> call in <code>gray_process()</code>',
      'Confirm the warning is gone when running the notebook',
      'Write a one-line comment explaining why the conversion is needed'
    ],
    hint: 'The warning message itself tells you exactly what function to use.'
  },
  {
    col: 'todo',
    tag: 'refactor',
    title: 'Vectorize the statistics() function',
    difficulty: 2,
    effort: '2–4 hrs',
    skills: 'NumPy, reading existing code',
    context: 'The <code>statistics()</code> function uses Python <code>for</code> loops to sum edge lengths and compute standard deviation. NumPy provides vectorized functions like <code>np.mean()</code> and <code>np.std()</code> that operate on entire arrays at once — these are faster and more readable.',
    tasks: [
      'Read the current function and identify every loop that computes a sum or statistic',
      'Extract all MST edge lengths into a NumPy array using a list comprehension',
      'Replace the manual mean/std calculations with <code>np.mean()</code> and <code>np.std(ddof=1)</code>',
      'Verify the outputs are identical to the original (test on the example image)',
      'Time both versions using <code>%%timeit</code> in a notebook cell'
    ],
    hint: 'The key pattern is: <code>lengths = np.array([G[u][v]["dis"] for u,v in G.edges()])</code>, then use numpy functions on <code>lengths</code>.'
  },
  {
    col: 'todo',
    tag: 'workflow',
    title: 'Create a plot_voronoi() helper function',
    difficulty: 1,
    effort: '2–3 hrs',
    skills: 'Python functions, Matplotlib',
    context: 'The notebook repeats very similar matplotlib code in several cells to plot Voronoi diagrams and overlay graphs. Wrapping this in a reusable function reduces repetition ("don\'t repeat yourself" or DRY principle) and makes the notebook much easier to read.',
    tasks: [
      'Identify all the repeated plotting patterns across notebook cells',
      'Write a function <code>plot_voronoi(img, img_vor, img_vor_deg, v_border, G_inner, g_msf=None)</code> with keyword arguments for what to show',
      'Add a docstring listing all parameters',
      'Replace the notebook plotting cells with calls to your function',
      'Add an option to save the figure to a file with a given filename'
    ],
    hint: 'Make all overlays (borders, degree color, graph edges) optional using boolean keyword arguments like <code>show_borders=True</code>.'
  },
  {
    col: 'todo',
    tag: 'workflow',
    title: 'Build a multi-image batch processing pipeline',
    difficulty: 2,
    effort: '4–6 hrs',
    skills: 'Python, pandas, file handling',
    context: 'Currently the notebook processes one image at a time. Real experiments produce many images and you want to compare statistics across them. This task involves writing a loop that runs the full pipeline on a list of files and collects results in a structured table.',
    tasks: [
      'Write a function <code>analyze_image(filepath, params)</code> that runs the full pipeline and returns a dict of statistics',
      'Write a loop that calls this function for each file in a directory and collects results',
      'Store results in a <code>pandas</code> DataFrame with one row per image',
      'Save the DataFrame to a CSV file using <code>df.to_csv()</code>',
      'Print a summary table at the end showing mean ± std for each statistic across all images'
    ],
    hint: 'Use <code>pathlib.Path</code> to list files: <code>list(Path("your_folder").glob("*.png"))</code>.'
  },
  {
    col: 'backlog',
    tag: 'workflow',
    title: 'Move area filtering from find_nodes() to voronoi_tree()',
    difficulty: 2,
    effort: '4–6 hrs',
    skills: 'Python, understanding the pipeline logic',
    context: 'Small/noisy segmentation regions are currently removed in <code>find_nodes()</code> before the Voronoi diagram is built. This means Voronoi cells near the noisy edges become artificially large (they expand to fill the space where a node was removed). Filtering after the Voronoi is built would fix this.',
    tasks: [
      'Understand why removing nodes before the Voronoi causes edge cells to expand — draw a small sketch',
      'Modify <code>find_nodes()</code> to keep all nodes (remove the area threshold)',
      'Add a post-Voronoi filtering step in <code>voronoi_tree()</code> that removes cells with very small or very large areas',
      'Have the function return both the full Voronoi and the filtered version',
      'Compare the resulting statistics with the original approach on the same image'
    ],
    hint: 'You can inspect Voronoi areas with <code>G.nodes[n]["area_vor"]</code> after running <code>voronoi_tree()</code>.'
  },
  {
    col: 'todo',
    tag: 'validation',
    title: 'Build a synthetic hexagonal lattice test',
    difficulty: 2,
    effort: '3–5 hrs',
    skills: 'NumPy, geometry, testing',
    context: 'A perfect hexagonal lattice is the expected "ideal" structure for 2D polymers. If you generate one synthetically and run it through the pipeline, you can check that the code gives defect ratio ≈ 0 and σ ≈ 0. This is called a validation test — it\'s how scientists verify their analysis tools are working correctly.',
    tasks: [
      'Generate a set of 2D hexagonal lattice points using NumPy (look up the geometry of a hex lattice)',
      'Create a fake labeled mask from these points by assigning each pixel to its nearest node',
      'Run <code>voronoi_tree()</code> and <code>statistics()</code> on this fake data',
      'Confirm that the defect ratio is 0 and σ is very small',
      'Repeat with small Gaussian noise added to node positions — how do the statistics change?'
    ],
    hint: 'Hex lattice points can be generated with basis vectors <code>a1 = [1, 0]</code> and <code>a2 = [0.5, √3/2]</code> scaled by lattice spacing.'
  },
  {
    col: 'backlog',
    tag: 'validation',
    title: 'Test sensitivity of results to the KDTree k parameter',
    difficulty: 1,
    effort: '2–3 hrs',
    skills: 'Python loops, Matplotlib',
    context: 'The Voronoi diagram is approximated by only checking the k nearest nodes per pixel (default k=8 or k=16). If k is too small, the approximation may be inaccurate near cell boundaries. This task checks whether the statistics depend on k.',
    tasks: [
      'Pick one image and run <code>voronoi_tree()</code> with k values from 4 to 24 in steps of 2',
      'Record the mean edge length m, σ, and defect ratio for each k',
      'Plot these statistics vs. k',
      'Identify the smallest k where results stop changing (the "converged" value)',
      'Write a short paragraph (3–5 sentences) explaining what you found and recommending a default k'
    ],
    hint: 'This is a standard numerical convergence test — the same kind of check physicists do when choosing grid sizes in simulations.'
  },
  {
    col: 'backlog',
    tag: 'analysis',
    title: 'Plot the degree distribution histogram',
    difficulty: 1,
    effort: '1–2 hrs',
    skills: 'Matplotlib, basic statistics',
    context: 'The degree (number of Voronoi neighbours) of each cell tells you how ordered the structure is. A perfect hexagonal lattice has every cell with degree 6. Real images have a spread. Plotting a histogram of degrees lets you visualize the disorder.',
    tasks: [
      'Extract <code>deg_list</code> from <code>statistics()</code>',
      'Plot a histogram using <code>plt.hist()</code> with integer bins',
      'Add a vertical dashed line at degree 6 labelled "ideal hexagonal"',
      'Annotate the plot with the defect ratio',
      'If you have batch results, overlay histograms from multiple images on the same plot'
    ],
    hint: 'Use <code>np.arange(min(deg_list)-0.5, max(deg_list)+1.5)</code> as your bin edges to centre bars on integer values.'
  },
  {
    col: 'backlog',
    tag: 'analysis',
    title: 'Plot and fit the MST edge length distribution',
    difficulty: 2,
    effort: '3–4 hrs',
    skills: 'NumPy, SciPy, Matplotlib',
    context: 'The distribution of edge lengths in the MST tells you about the spacing between polymer nodes. For an ordered crystal, you\'d expect a sharp peak. For a disordered structure, the distribution is broader. Fitting a Gaussian lets you extract a centre (mean spacing) and width (disorder) in physical units (nm).',
    tasks: [
      'Extract all MST edge lengths into a NumPy array',
      'Plot a histogram with physical units on the x-axis (nm)',
      'Fit a Gaussian using <code>scipy.stats.norm.fit()</code>',
      'Overlay the fitted curve on the histogram',
      'Report the fitted mean and standard deviation with units'
    ],
    hint: '<code>scipy.stats.norm.fit(data)</code> returns (mean, std). Use <code>scipy.stats.norm.pdf(x, mean, std)</code> to evaluate the curve.'
  },
  {
    col: 'backlog',
    tag: 'workflow',
    title: 'Investigate the Voronoi power weight parameter',
    difficulty: 2,
    effort: '4–6 hrs',
    skills: 'Python loops, NumPy, Matplotlib, scientific reasoning',
    context: 'The power diagram weights each node\'s influence by <code>w = area^p</code> where currently p=0.3. Changing p changes the shape of Voronoi cells. Smaller p gives cells closer to an unweighted Voronoi; larger p gives more influence to larger nodes. This task investigates how p affects the measured statistics.',
    tasks: [
      'Read the power diagram section in <code>voronoi_tree()</code> and make sure you understand what the weight does',
      'Run the full pipeline for p values from 0.0 to 1.0 in steps of 0.1 on one image',
      'Plot m, σ, and defect ratio vs. p',
      'Identify whether and where the results are stable (insensitive to p)',
      'Write a short scientific justification for choosing a particular value of p'
    ],
    hint: 'p=0 means equal weights (standard Voronoi). p=1 means weights equal to area. Try to understand physically what each limit means for the cell assignments.'
  },
  {
    col: 'stretch',
    tag: 'analysis',
    title: 'Compute the pair correlation function g(r)',
    difficulty: 3,
    effort: '6–10 hrs',
    skills: 'NumPy, SciPy, condensed matter physics',
    context: 'The pair correlation function g(r) (also called the radial distribution function) is a standard tool in condensed matter physics. It measures the probability of finding a second node at distance r from any given node, relative to a random distribution. Sharp peaks at regular intervals indicate crystalline order; broad or absent peaks indicate disorder.',
    tasks: [
      'Read about the radial distribution function (e.g., in Kittel or online condensed matter notes)',
      'Extract node positions from <code>G_inner</code> as a 2D NumPy array',
      'Compute all pairwise distances using <code>scipy.spatial.distance.pdist()</code>',
      'Bin the distances into a histogram and normalise by the expected number of pairs at each r for a random distribution',
      'Plot g(r) and identify peaks corresponding to nearest-neighbour, second-nearest-neighbour distances etc.',
      'Compare g(r) for a highly ordered vs disordered image'
    ],
    hint: 'The normalisation factor for a 2D system at distance r is <code>2πr·Δr·(N/A)</code> where N is the number of nodes and A is the image area.'
  },
  {
    col: 'stretch',
    tag: 'analysis',
    title: 'Compute the hexatic order parameter ψ₆',
    difficulty: 3,
    effort: '6–10 hrs',
    skills: 'Complex numbers, NumPy, condensed matter physics',
    context: 'The local hexatic order parameter ψ₆ measures how close each cell is to having perfect 6-fold symmetry with its neighbours. For each node, you compute ψ₆ = (1/n) Σ exp(6iθⱼ) where θⱼ is the angle to the j-th neighbour. |ψ₆| = 1 means perfect hexagonal order; |ψ₆| = 0 means no orientational order. This is a standard order parameter in 2D materials physics.',
    tasks: [
      'Read about the bond-orientational order parameter (search "hexatic order parameter 2D")',
      'For each node in <code>G_inner</code>, get the list of neighbours and their positions',
      'Compute the angle to each neighbour using <code>np.arctan2()</code>',
      'Compute ψ₆ using complex exponentials: <code>np.mean(np.exp(6j * angles))</code>',
      'Compute |ψ₆| for each node and store as a node attribute',
      'Map |ψ₆| back to image space as a colour overlay (colourmap from 0 to 1)',
      'Report the mean |ψ₆| for each image and compare across your dataset'
    ],
    hint: 'Python handles complex numbers natively: <code>np.exp(6j * theta)</code> works directly. The magnitude is <code>abs(psi6)</code>.'
  }
];

const colDefs = [
  { id: 'todo', label: 'To do', cls: 'col-todo' },
  { id: 'backlog', label: 'Backlog', cls: 'col-backlog' },
  { id: 'stretch', label: 'Stretch goals', cls: 'col-stretch' },
];

const tagLabel = { refactor: 'Code quality', workflow: 'Workflow', analysis: 'Analysis', validation: 'Validation' };
const tagCls = { refactor: 'tag-refactor', workflow: 'tag-workflow', analysis: 'tag-analysis', validation: 'tag-validation' };
const diffLabel = { 1: 'Beginner', 2: 'Intermediate', 3: 'Advanced' };
const diffCls = { 1: 'diff-1', 2: 'diff-2', 3: 'diff-3' };

let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  colDefs.forEach(col => {
    const colTasks = tasks.filter(t => t.col === col.id && (activeFilter === 'all' || t.tag === activeFilter));
    const div = document.createElement('div');
    div.className = col.cls;
    div.innerHTML = `<div class="column-header">${col.label} <span style="font-weight:400;opacity:0.6">(${colTasks.length})</span></div>`;
    colTasks.forEach((t, i) => {
      const globalIdx = tasks.indexOf(t);
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openModal(globalIdx);
      card.innerHTML = `
        <div>
          <span class="card-tag ${tagCls[t.tag]}">${tagLabel[t.tag]}</span>
        </div>
        <div class="card-title">${t.title}</div>
        <div class="card-meta">
          <span class="difficulty-pip ${diffCls[t.difficulty]}"></span>${diffLabel[t.difficulty]} · ${t.effort}
        </div>`;
      div.appendChild(card);
    });
    if (colTasks.length === 0) {
      div.innerHTML += `<div style="font-size:12px;color:var(--color-text-tertiary);padding:8px 0">No tasks</div>`;
    }
    board.appendChild(div);
  });
}

function openModal(idx) {
  const t = tasks[idx];
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <span class="modal-tag ${tagCls[t.tag]}">${tagLabel[t.tag]}</span>
    <div class="modal-title">${t.title}</div>
    <div style="display:flex;gap:16px;margin-bottom:4px">
      <span style="font-size:12px;color:var(--color-text-secondary)">
        <span class="difficulty-pip ${diffCls[t.difficulty]}"></span>${diffLabel[t.difficulty]}
      </span>
      <span style="font-size:12px;color:var(--color-text-secondary)">Est. ${t.effort}</span>
    </div>
    <div class="modal-section">Skills needed</div>
    <div class="modal-body">${t.skills}</div>
    <div class="modal-section">Background</div>
    <div class="modal-body">${t.context}</div>
    <div class="modal-section">Tasks</div>
    <div class="modal-body"><ul>${t.tasks.map(s => `<li>${s}</li>`).join('')}</ul></div>
    <div class="modal-section">Hint</div>
    <div class="modal-body">${t.hint}</div>
  `;
  document.getElementById('backdrop').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('backdrop')) {
    document.getElementById('backdrop').classList.remove('open');
  }
}

renderBoard();
</script>
